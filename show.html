<script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const supabaseUrl = 'https://nymndfucfwgjfxhawkxx.supabase.co';
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im55bW5kZnVjZndnamZ4aGF3a3h4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMDU3NzUsImV4cCI6MjA5MTY4MTc3NX0.fuqQ5_VDW4wq3ENsqop9SJ_c3P333UKQSnZmxNZPbZk";
    
    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get('id');
    const supabase = createClient(supabaseUrl, supabaseKey);
    
    // جلب بيانات المنتج
    const {data:product, error:ex} = await supabase.from('products').select('*').eq('id',id).single();
        
    var space = document.getElementById('space');
    const thisproduct = `
        <h1 center style="margin: 5px; font-size: 40px;" tbrown p-1 rows> 
            <img src="${product.logo}" style="margin-top: 0px; height:5rem; width:5rem;border-radius:5rem">${product.name}
        </h1>
        <p center style="margin: 5px; font-size: 20px; padding: 10px; white-space: pre-wrap;" tbrown> ${product.d2} </p>
        <img src="${product.img1}" w-90p style="margin-top: 0px; height:20rem">
        <p center style="margin: 5px; font-size: 20px; padding: 10px; white-space: pre-wrap;" tbrown> ${product.des}</p>
        <a href="${product.url}"><button btn=brown twhite style='margin:5px'>الرابط</button></a>
    `;
    space.innerHTML += thisproduct;

   
    const {data:comments, error:exo} = await supabase.from('comments').select('*').eq('post', id);
    var jojo = document.getElementById('jojo');
    
    if (comments) {
        for(const comment of comments){
            const como = `
                <div b-black nof style='height:20rem; padding:1rem; margin-bottom:30px;' columns w-90p>
                    <p top tbrown tsmall center rows tbold style="font-size: 24px; margin-top: 1rem;">
                        <img src="${comment.avatar}" style='height:4rem; width:4rem; border-radius:4rem;margin-bottom: 1rem;'> 
                        ${comment.writer}
                    </p>
                    <h1 center tsmall w-90p h-50p ol style='padding:1rem;'>${comment.text}</h1>
                </div>
            `;
            jojo.innerHTML += como;
        }
    }

    // جلب أزرار وحقول المدخلات لتجنب أخطاء التعريف
    const koko = document.getElementById('koko');
    const lolo = document.getElementById('lolo');

    koko.onclick = async function(){
        const { data: { user } } = await supabase.auth.getUser();
                
        if (!user) {
            const { error } = await supabase.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.href }
            });
            if (error) alert('خطأ في تسجيل الدخول: ' + error.message);
            return null;
        } else {
            const fullName = user.user_metadata.full_name;
            const avatarUrl = user.user_metadata.avatar_url;
            
            const { error } = await supabase.from('comments').insert({
                text: lolo.value,
                writer: fullName,
                upvotes: 0,
                post: id,
                avatar: avatarUrl
            });

            if (error) {
                alert('حدث خطأ أثناء إضافة التعليق');
            } else {
                location.reload();
            }
        }
    }
</script>
